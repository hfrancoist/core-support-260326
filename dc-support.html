<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DS Core — Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ─── TOKENS ── */
    :root {
      --font:'Be Vietnam Pro',sans-serif;
      --text-base:16px;--w-base:400;--lh-base:24px;--ls-base:-0.4px;
      --text-strong:16px;--w-strong:600;--lh-strong:24px;--ls-strong:-0.4px;
      --text-action:14px;--w-action:600;--lh-action:24px;--ls-action:-0.35px;
      --sp-xxs:4px;--sp-xs:8px;--sp-s:12px;--sp-m:16px;--sp-l:24px;--sp-ll:48px;
      --br-s:4px;--br-m:8px;--br-std:12px;--br-lg:16px;--br-pill:999px;
      --c-bg:#f5f5f5;--c-surface:#fff;--c-text:#242424;--c-sub:#575757;
      --c-dis:#8a8a8a;--c-on-pri:#fff;--c-border:#d7d7d7;--c-border-sub:#ebebeb;
      --c-border-foc:#71a2fe;--c-pri:#0f62fe;--c-pri-h:#014bd5;--c-sec-h:#ebebeb;
      --sh1:0 1px 1px rgba(0,0,0,.02),0 2px 8px rgba(0,0,0,.04);
      --sh2:0 2px 4px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.08);
    }

    /* ─── RESET ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:var(--font);font-size:var(--text-base);color:var(--c-text);background:var(--c-bg);-webkit-font-smoothing:antialiased;}
    button{font-family:inherit;border:none;background:none;cursor:pointer;}
    input,textarea{font-family:inherit;}

    /* ─── DEMO BAR ── */
    .demo-bar{
      position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:2000;
      display:flex;align-items:center;gap:8px;
      background:rgba(255,255,255,.95);border:1px solid var(--c-border);
      border-radius:var(--br-std);padding:8px 12px;box-shadow:var(--sh2);
    }
    .demo-lbl{font-size:11px;font-weight:600;color:var(--c-sub);letter-spacing:.05em;text-transform:uppercase;}
    .demo-btn{padding:4px 10px;border-radius:var(--br-m);font-size:12px;font-weight:600;font-family:var(--font);color:var(--c-sub);border:1px solid transparent;cursor:pointer;transition:all .15s;}
    .demo-btn:hover{background:var(--c-bg);color:var(--c-text);}
    .demo-btn.on{background:var(--c-pri);color:#fff;}

    /* ─── PAGE SHELL ── */
    .page{display:flex;height:100vh;width:100%;}

    /* Sidebar */
    .sidebar{width:256px;flex-shrink:0;height:100%;background:var(--c-surface);display:flex;flex-direction:column;}
    .menu-header{display:flex;align-items:center;gap:var(--sp-xs);padding:var(--sp-s) var(--sp-s) var(--sp-m) var(--sp-m);}
    .text-logo{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--c-text);white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
    .logo-mark{width:20px;height:20px;background:var(--c-text);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-mark svg{width:12px;height:12px;}
    .icon-btn{display:flex;align-items:center;justify-content:center;padding:var(--sp-xs);border-radius:var(--br-std);color:var(--c-text);transition:background .15s;flex-shrink:0;}
    .icon-btn:hover{background:var(--c-bg);}
    .icon-btn svg{width:24px;height:24px;}
    .nav-list{display:flex;flex-direction:column;gap:var(--sp-xxs);padding:0 var(--sp-s);}
    .nav-item{display:flex;align-items:center;gap:var(--sp-xs);padding:var(--sp-s);border-radius:var(--br-std);width:100%;color:var(--c-text);font-size:var(--text-base);font-weight:var(--w-base);line-height:var(--lh-base);letter-spacing:var(--ls-base);transition:background .15s;text-align:left;}
    .nav-item:hover{background:var(--c-bg);}
    .nav-item svg{width:24px;height:24px;flex-shrink:0;}

    /* Content column */
    .content{flex:1;min-width:0;height:100%;display:flex;flex-direction:column;overflow:hidden;}

    /* Topbar */
    .topbar{background:var(--c-bg);display:flex;align-items:center;justify-content:flex-end;padding:var(--sp-s) var(--sp-m);gap:var(--sp-xs);flex-shrink:0;}
    .avatar{width:40px;height:40px;border-radius:var(--br-std);background:#d1e1ff;display:flex;align-items:center;justify-content:center;font-size:var(--text-strong);font-weight:var(--w-strong);color:var(--c-pri);cursor:pointer;flex-shrink:0;font-family:var(--font);}

    /* Blank page body — nothing here, the modal IS the experience */
    .page-body{flex:1;background:var(--c-bg);}

    /* ─── BUTTONS ── */
    .btn-pri{display:inline-flex;align-items:center;gap:var(--sp-xs);padding:var(--sp-xs) var(--sp-m);height:40px;border-radius:var(--br-std);font-family:var(--font);font-size:var(--text-action);font-weight:var(--w-action);letter-spacing:var(--ls-action);color:var(--c-on-pri);border:none;background:var(--c-pri);box-shadow:var(--sh2);cursor:pointer;transition:background .15s;white-space:nowrap;}
    .btn-pri:hover{background:var(--c-pri-h);}
    .btn-sec{display:inline-flex;align-items:center;gap:var(--sp-xs);padding:var(--sp-xs) var(--sp-m);height:40px;border-radius:var(--br-std);font-family:var(--font);font-size:var(--text-action);font-weight:var(--w-action);letter-spacing:var(--ls-action);color:var(--c-text);border:1px solid var(--c-border-sub);background:var(--c-surface);box-shadow:var(--sh1);cursor:pointer;transition:background .15s;white-space:nowrap;}
    .btn-sec:hover{background:var(--c-sec-h);}

    /* ─── MODAL OVERLAY ── */
    .modal-backdrop{
      position:fixed;inset:0;
      background:rgba(0,0,0,.32);
      z-index:400;
      display:flex;align-items:center;justify-content:center;
      /* starts open — this IS the page */
      opacity:1;pointer-events:all;
      transition:opacity .2s;
    }
    .modal-backdrop.closing{opacity:0;pointer-events:none;}

    /* Modal box */
    .modal{
      background:var(--c-surface);
      border-radius:var(--br-lg);
      padding:var(--sp-l);
      width:min(510px,calc(100vw - 48px));
      display:flex;flex-direction:column;gap:var(--sp-l);
      box-shadow:0 8px 40px rgba(0,0,0,.18);
      position:relative;z-index:401;
      animation:modal-in .2s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes modal-in{from{opacity:0;transform:scale(.97) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}

    /* Headline */
    .modal-headline{display:flex;align-items:flex-start;gap:var(--sp-l);}
    .modal-title{flex:1;font-size:24px;font-weight:600;line-height:32px;letter-spacing:-0.6px;color:var(--c-text);padding:var(--sp-xxs) 0;}
    .modal-close{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:var(--br-std);color:var(--c-sub);transition:background .15s;flex-shrink:0;}
    .modal-close:hover{background:var(--c-sec-h);}
    .modal-close svg{width:24px;height:24px;}

    /* 3 compact cards */
    .modal-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-m);}
    .modal-card{
      background:var(--c-surface);border:1px solid var(--c-border-sub);
      border-radius:var(--br-std);padding:var(--sp-m);box-shadow:var(--sh1);
      cursor:pointer;transition:box-shadow .15s,border-color .15s;
      display:flex;flex-direction:column;gap:var(--sp-xs);
    }
    .modal-card:hover{box-shadow:var(--sh2);border-color:var(--c-border);}
    .modal-card-img{
      height:130px;border-radius:var(--br-m);overflow:hidden;
      background:rgba(0,0,0,.04);
    }
    .modal-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
    .modal-card-label{font-size:var(--text-base);font-weight:var(--w-base);line-height:var(--lh-base);letter-spacing:var(--ls-base);color:var(--c-text);}
    .modal-card-value{font-size:var(--text-action);font-weight:var(--w-action);line-height:var(--lh-action);letter-spacing:var(--ls-action);color:var(--c-pri);}
    .modal-card-value.book{color:var(--c-pri-h);}

    /* Form fields */
    .modal-body{display:flex;flex-direction:column;gap:var(--sp-m);}
    .field-wrap{display:flex;flex-direction:column;gap:var(--sp-xxs);}
    .field-label{font-size:var(--text-base);font-weight:var(--w-base);line-height:var(--lh-base);letter-spacing:var(--ls-base);color:var(--c-text);}
    .field-input{height:40px;padding:var(--sp-xs) var(--sp-m);border:1px solid var(--c-border);border-radius:var(--br-std);background:var(--c-surface);font-family:var(--font);font-size:var(--text-base);color:var(--c-text);outline:none;transition:border .12s;width:100%;}
    .field-input::placeholder{color:var(--c-dis);}
    .field-input:focus{border:2px solid var(--c-border-foc);}
    textarea.field-input{height:120px;resize:vertical;line-height:var(--lh-base);}

    /* Toolbar */
    .modal-toolbar{display:flex;align-items:center;justify-content:flex-end;gap:var(--sp-xs);}

    /* ─── BREAKPOINTS ── */
    html.bp-l .sidebar{width:72px;}
    html.bp-l .nav-item span{display:none;}
    html.bp-l .menu-header .text-logo span:not(.logo-mark){display:none;}
    html.bp-l .modal-cards{grid-template-columns:1fr 1fr;}
    html.bp-m .sidebar,html.bp-s .sidebar{display:none;}
    html.bp-m .topbar,html.bp-s .topbar{justify-content:space-between;}
    html.bp-s .modal-cards{grid-template-columns:1fr;}
    html.bp-m .modal-cards{grid-template-columns:1fr 1fr;}
  </style>
</head>
<body>

  <!-- DEMO BAR -->
  <div class="demo-bar">
    <span class="demo-lbl">Layout</span>
    <button class="demo-btn on" id="btn-xl">XL</button>
    <button class="demo-btn" id="btn-l">L</button>
    <button class="demo-btn" id="btn-m">M</button>
    <button class="demo-btn" id="btn-s">S</button>
  </div>

  <!-- PAGE SHELL (blank — modal is the experience) -->
  <div class="page">

    <!-- Sidebar — Support removed from nav -->
    <nav class="sidebar">
      <div class="menu-header">
        <button class="icon-btn" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="5" y1="8" x2="19" y2="8"/><line x1="5" y1="12" x2="19" y2="12"/><line x1="5" y1="16" x2="19" y2="16"/></svg>
        </button>
        <span class="text-logo">
          <span class="logo-mark"><svg viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4" stroke="white" stroke-width="1.5"/><path d="M4 6h4M6 4v4" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></span>
          DS Core
        </span>
      </div>
      <div class="nav-list">
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="3"/><path d="M3 21v-2a5 5 0 015-5h4a5 5 0 015 5v2"/><circle cx="17" cy="9" r="2.5"/><path d="M20 21v-1.5a4 4 0 00-2-3.46"/></svg>
          <span>Patients</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          <span>Orders</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51L8.59 10.49"/></svg>
          <span>Collaboration</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16M6 20v-6h5v6M11 14V8h2v6M13 10h5M16 20v-6h2v6"/></svg>
          <span>Treatments</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
          <span>Jobs</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="6" width="16" height="13" rx="2"/><path d="M2 10h2M2 14h2"/><circle cx="9" cy="11" r="1.5"/><polyline points="18 19 14 14 9 19"/></svg>
          <span>Files</span>
        </button>
        <button class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M7 7V5a5 5 0 0110 0v2"/><circle cx="12" cy="14" r="2"/></svg>
          <span>Equipment</span>
        </button>
      </div>
    </nav>

    <!-- Content -->
    <div class="content">

      <!-- Topbar — ? support icon lives here, top right -->
      <header class="topbar">
        <button class="icon-btn" id="open-support" aria-label="Support">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
        <button class="icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </button>
        <button class="avatar">ZG</button>
      </header>

      <!-- Empty page body -->
      <div class="page-body"></div>
    </div>
  </div>

  <!-- ─── CONTACT US MODAL + DIM OVERLAY — open by default ─── -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">

      <!-- Headline -->
      <div class="modal-headline">
        <p class="modal-title" id="modal-title">Contact us</p>
        <button class="modal-close" id="modal-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <!-- 3 pillars: Contact support · DS Core Create Helpline · DS Core consultation -->
        <div class="modal-cards">
          <div class="modal-card">
            <div class="modal-card-img">
              <img src="https://www.figma.com/api/mcp/asset/c648f4bd-dce6-41a4-9fd9-9ebec4008d09" alt="Contact support" onerror="this.style.opacity='.25'"/>
            </div>
            <span class="modal-card-label">Contact support</span>
            <span class="modal-card-value">+41 44 000 0000</span>
          </div>
          <div class="modal-card">
            <div class="modal-card-img">
              <img src="https://www.figma.com/api/mcp/asset/f8a2af70-2daf-462b-aed1-27ae2afa6c9e" alt="DS Core Create Helpline" onerror="this.style.opacity='.25'"/>
            </div>
            <span class="modal-card-label">DS Core Create Helpline</span>
            <span class="modal-card-value">+41 44 000 0001</span>
          </div>
          <div class="modal-card">
            <div class="modal-card-img" style="background:#f5f5f5;">
              <img src="https://www.figma.com/api/mcp/asset/ac0b1123-12fb-43d2-b044-ff6e2b3714b4" alt="DS Core consultation" onerror="this.style.opacity='.25'"/>
            </div>
            <span class="modal-card-label">DS Core consultation</span>
            <span class="modal-card-value book">Book your 1-on-1 session</span>
          </div>
        </div>

        <!-- Phone number field -->
        <div class="field-wrap">
          <label class="field-label" for="modal-phone">Phone number</label>
          <input class="field-input" id="modal-phone" type="tel" placeholder="Enter phone number"/>
        </div>

        <!-- Message field -->
        <div class="field-wrap">
          <label class="field-label" for="modal-message">Message</label>
          <textarea class="field-input" id="modal-message" placeholder="Describe your problem, and our service will contact you as soon as possible."></textarea>
        </div>

      </div>

      <!-- Toolbar -->
      <div class="modal-toolbar">
        <button class="btn-sec" id="modal-cancel">Cancel</button>
        <button class="btn-pri" id="modal-send">Send</button>
      </div>

    </div>
  </div>

  <script>
    /* ── Demo bar ── */
    ['xl','l','m','s'].forEach(function(b){
      var btn=document.getElementById('btn-'+b);
      if(btn) btn.addEventListener('click',function(){
        document.documentElement.classList.remove('bp-l','bp-m','bp-s');
        if(b!=='xl') document.documentElement.classList.add('bp-'+b);
        ['xl','l','m','s'].forEach(function(x){
          var el=document.getElementById('btn-'+x);
          if(el) el.classList.toggle('on',x===b);
        });
      });
    });

    /* ── Modal open / close ── */
    function openModal(){
      var bd=document.getElementById('modal-backdrop');
      bd.classList.remove('closing');
      bd.style.display='flex';
      // force reflow then show
      bd.offsetHeight;
      bd.style.opacity='1';
      bd.style.pointerEvents='all';
    }
    function closeModal(){
      var bd=document.getElementById('modal-backdrop');
      bd.style.opacity='0';
      bd.style.pointerEvents='none';
    }

    /* Support (?) icon in topbar re-opens the modal */
    document.getElementById('open-support').addEventListener('click', openModal);

    /* Close triggers */
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-cancel').addEventListener('click', closeModal);

    /* Backdrop click outside modal box */
    document.getElementById('modal-backdrop').addEventListener('click', function(e){
      if(e.target===this) closeModal();
    });

    /* Escape */
    document.addEventListener('keydown', function(e){
      if(e.key==='Escape') closeModal();
    });

    /* Send */
    document.getElementById('modal-send').addEventListener('click', function(){
      var phone=document.getElementById('modal-phone').value.trim();
      var msg=document.getElementById('modal-message').value.trim();
      if(!phone&&!msg){ document.getElementById('modal-phone').focus(); return; }
      closeModal();
      document.getElementById('modal-phone').value='';
      document.getElementById('modal-message').value='';
    });
  </script>
</body>
</html>
